name: pull-request

on:
  pull_request:

permissions:
  actions: read
  contents: read

jobs:
  dependencies:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: run osv-scanner after PR
        uses: google/osv-scanner-action/osv-scanner-action@7222d1c7ee4f96d71d883e0d3c603f1e1705eca9
        with:
          scan-args: |-
            --format json
            --output osv-after.json
            ./
        continue-on-error: true

      - name: checkout baseline commit
        run: |
          git checkout ${{ github.event.pull_request.base.sha }}

      - name: run osv-scanner before PR
        uses: google/osv-scanner-action/osv-scanner-action@7222d1c7ee4f96d71d883e0d3c603f1e1705eca9
        with:
          scan-args: |-
            --format json
            --output osv-before.json
            ./
        continue-on-error: true

      - name: compare analysis
        uses: google/osv-scanner-action/osv-reporter-action@7222d1c7ee4f96d71d883e0d3c603f1e1705eca9
        with:
          before: osv-before.json
          after: osv-after.json
          output: osv-diff.json
        continue-on-error: true

      - name: save differential report
        uses: actions/upload-artifact@v4
        with:
          name: dependencies-differential-report
          path: osv-diff.json

  source-code-analysis:
    runs-on: ubuntu-latest
    container:
      image: returntocorp/semgrep:latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: run semgrep differential analysis
        run: semgrep scan --config .semgrep --baseline-commit ${{ github.event.pull_request.base.sha }} --sarif --output semgrep-diff.sarif .
        continue-on-error: true

      - name: save differential report
        uses: actions/upload-artifact@v4
        with:
          name: source-code-analysis-differential-report
          path: semgrep-diff.sarif
