name: security

on:
  workflow_dispatch:

permissions:
  # Required to upload SARIF file to CodeQL.
  actions: read
  # Require writing security events to upload SARIF file
  security-events: write
  # to fetch code (actions/checkout)
  contents: read
  
jobs:
  dependencies:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: run osv-scanner
        uses: google/osv-scanner-action@v2.3.5
        with:
          scan-args: |-
            --format sarif
            --output DependenciesAnalysisFull.sarif
            ./
        continue-on-error: true

      - name: upload sarif
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: DependenciesAnalysisFull.sarif

  source-code-analysis:
    runs-on: ubuntu-latest
    container:
      image: returntocorp/semgrep:latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: run semgrep
        run: semgrep scan --config .semgrep --sarif --output SourceCodeAnalysisFull.sarif .

      - name: upload sarif
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: SourceCodeAnalysisFull.sarif
